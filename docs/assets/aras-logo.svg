<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%" role="img" aria-label="ARAS logo">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="800" height="200" rx="14" fill="#09090B"/>
  <rect width="800" height="200" rx="14" fill="url(#dotGrid)"/>

  <g transform="translate(130, 100)">
    <circle cx="0" cy="0" r="55" stroke="#1F2937" stroke-width="1.5" fill="none"/>
    <path d="M -55 0 A 55 55 0 0 1 0 -55" stroke="url(#neonGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 55 0 A 55 55 0 0 1 0 55" stroke="url(#neonGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

    <path d="M 0 -32 L 27.7 -16 L 27.7 16 L 0 32 L -27.7 16 L -27.7 -16 Z" fill="none" stroke="url(#neonGrad)" stroke-width="3" stroke-linejoin="round"/>

    <circle cx="0" cy="0" r="6" fill="#10B981" filter="url(#glow)"/>
    <line x1="0" y1="-32" x2="0" y2="-12" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.8"/>
    <line x1="-27.7" y1="16" x2="-10" y2="6" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.8"/>
    <line x1="27.7" y1="16" x2="10" y2="6" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.8"/>
  </g>

  <g transform="translate(240, 108)">
    <text x="0" y="0" font-family="'Courier New', Courier, monospace" font-size="54" font-weight="700" fill="url(#textGrad)" letter-spacing="4">ARAS</text>
    <text x="4" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#64748B" letter-spacing="2">&gt;_ AUTONOMOUS RESEARCH AGENT SYSTEM</text>
  </g>
</svg>
